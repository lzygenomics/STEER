site_name: STEER
site_description: Spatial-Temporal Explainable Expert model for RNA velocity inference
site_author: lzygenomics
site_url: !ENV [READTHEDOCS_CANONICAL_URL, '']
repo_url: https://github.com/lzygenomics/STEER
repo_name: lzygenomics/STEER
edit_uri: edit/master/docs/

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Tutorials:
      - Overview: tutorials/index.md
      - Core Pipeline: tutorials/core-pipeline.md
      - Slide-seq Preprocessing: tutorials/slide-seq.md
      - 10x Visium Preprocessing: tutorials/visium.md
      - Stereo-seq Preprocessing: tutorials/stereo-seq.md
  - Citation: citation.md
  - FAQ: faq.md

theme:
  name: material
  language: en
  logo: assets/images/steer-logo.svg
  favicon: assets/images/steer-logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lzygenomics/STEER
    - icon: fontawesome/solid/paper-plane
      link: mailto:lzy_math@163.com

copyright: Copyright © 2026 STEER contributors
