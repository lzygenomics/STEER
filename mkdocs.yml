site_name: STEER
site_url: https://steer.readthedocs.io/
repo_url: https://github.com/lzygenomics/STEER
repo_name: lzygenomics/STEER

theme:
  name: material
  logo: assets/images/steer_logo.png
  favicon: assets/images/steer_logo.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.integrate
  palette:
    - scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocs-jupyter

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Tutorials:
      - Overview: tutorials/index.md
      - Quick Start Notebook: notebooks/quickstart.ipynb
      - Core Pipeline Notebook: notebooks/demo_tutorial.ipynb
      - Main Figures: tutorials/main-figures.md
      - Figure 2 Notebook: notebooks/Figure2.ipynb
      - Figure 3 Notebook: notebooks/Figure3.ipynb
      - Figure 4 Notebook: notebooks/Figure4.ipynb
      - Figure 5 Notebook: notebooks/Figure5.ipynb
      - Raw Data Preprocessing: tutorials/raw-data-preprocessing.md
  - Citation: citation.md
